<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Extension Icons</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 20px;
    }
    h1 { font-size: 18px; }
    p { color: #aaa; font-size: 14px; max-width: 480px; text-align: center; }
    .icons { display: flex; gap: 20px; align-items: flex-end; }
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas { border-radius: 12px; image-rendering: pixelated; }
    .label { font-size: 12px; color: #888; }
    button {
      padding: 10px 24px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #ff6666; }
  </style>
</head>
<body>
  <h1>YouTube Downloader — Icon Generator</h1>
  <p>Click the button below to generate and download the extension icons. Place them in the <code>icons/</code> folder.</p>

  <div class="icons">
    <div class="icon-card">
      <canvas id="c16" width="16" height="16"></canvas>
      <span class="label">16×16</span>
    </div>
    <div class="icon-card">
      <canvas id="c48" width="48" height="48"></canvas>
      <span class="label">48×48</span>
    </div>
    <div class="icon-card">
      <canvas id="c128" width="128" height="128"></canvas>
      <span class="label">128×128</span>
    </div>
  </div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 48, 128];

    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');

      // Background — rounded rectangle (red)
      const r = s * 0.18;
      ctx.fillStyle = '#ff4444';
      roundRect(ctx, 0, 0, s, s, r);
      ctx.fill();

      // Play triangle (white)
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      const cx = s * 0.55;
      const cy = s * 0.5;
      const ts = s * 0.32;
      ctx.moveTo(cx - ts * 0.4, cy - ts * 0.5);
      ctx.lineTo(cx + ts * 0.5, cy);
      ctx.lineTo(cx - ts * 0.4, cy + ts * 0.5);
      ctx.closePath();
      ctx.fill();

      // Download arrow (small, bottom-right)
      const as = s * 0.25;
      const ax = s * 0.72;
      const ay = s * 0.75;
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = Math.max(1, s * 0.06);
      ctx.lineCap = 'round';

      // Arrow shaft
      ctx.beginPath();
      ctx.moveTo(ax, ay - as * 0.5);
      ctx.lineTo(ax, ay + as * 0.15);
      ctx.stroke();

      // Arrow head
      ctx.beginPath();
      ctx.moveTo(ax - as * 0.3, ay - as * 0.05);
      ctx.lineTo(ax, ay + as * 0.3);
      ctx.lineTo(ax + as * 0.3, ay - as * 0.05);
      ctx.stroke();

      // Base line
      ctx.beginPath();
      ctx.moveTo(ax - as * 0.35, ay + as * 0.4);
      ctx.lineTo(ax + as * 0.35, ay + as * 0.4);
      ctx.stroke();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Draw all canvases
    sizes.forEach(s => {
      drawIcon(document.getElementById('c' + s));
    });

    function downloadAll() {
      sizes.forEach(s => {
        const canvas = document.getElementById('c' + s);
        const link = document.createElement('a');
        link.download = `icon${s}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
